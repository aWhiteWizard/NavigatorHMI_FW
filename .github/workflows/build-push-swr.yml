name: Build and Push to Huawei SWR

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'v1.0.0'
        required: false
        default: 'latest'
        type: string
      # 可以选择构建哪些架构
      platforms:
        description: 'linux/amd64,linux/arm64'
        required: false
        default: 'linux/amd64,linux/arm64'
        type: string

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: "true"
  REGISTRY: swr.cn-southwest-2.myhuaweicloud.com
  ORGANIZATION: image-linuxenv
  IMAGE_NAME: fw-builder-env

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU (for multi-arch emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Huawei SWR
        uses: huaweicloud/swr-login@v1
        with:
          region: 'cn-southwest-2'
          access-key-id: ${{ secrets.AK }}
          access-key-secret: ${{ secrets.SK }}

      - name: Build and push multi-arch images
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./.devcontainer/dockerfile          # 确保 Dockerfile 在仓库根目录，否则修改路径
          push: true
          platforms: ${{ github.event.inputs.platforms }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.ORGANIZATION }}/${{ env.IMAGE_NAME }}:${{ github.event.inputs.image_tag }}
            ${{ env.REGISTRY }}/${{ env.ORGANIZATION }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # 如果你需要传递构建参数给 Dockerfile，可以在这里添加 build-args
          # build-args: |
          #   VERSION=1.0

      - name: Output image info
        run: |
          echo "✅ 成功推送以下镜像："
          echo "  ${{ env.REGISTRY }}/${{ env.ORGANIZATION }}/${{ env.IMAGE_NAME }}:${{ github.event.inputs.image_tag }}"
          echo "  ${{ env.REGISTRY }}/${{ env.ORGANIZATION }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"