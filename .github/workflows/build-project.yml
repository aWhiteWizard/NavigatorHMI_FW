name: Build NavigatorHMI_FW (ARM)

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Debug or Release'
        required: true
        default: 'Debug'
        type: choice
        options:
          - Debug
          - Release
      target:
        description: 'Build target'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - linux
          - uboot
          - app
          - linux+app
          - qt
          - rootfs

env:
  BUILDER_IMAGE: swr.cn-southwest-2.myhuaweicloud.com/image-linuxenv/fw-builder-env:v1.2-ubuntu18

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Huawei SWR (pull builder image)
        uses: huaweicloud/swr-login@v1
        with:
          region: 'cn-southwest-2'
          access-key-id: ${{ secrets.AK }}
          access-key-secret: ${{ secrets.SK }}

      - name: Pull builder image
        run: docker pull ${{ env.BUILDER_IMAGE }}

      - name: Create build directories
        run: mkdir -p build/buildroot/dl build/linux build/uboot build/rootfs

      - name: Build (Linux Kernel 6.6 + U-Boot + App + Rootfs)
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            -e BR2_DL_DIR="/workspace/build/buildroot/dl" \
            -e FORCE_UNSAFE_CONFIGURE=1 \
            -w /workspace \
            ${{ env.BUILDER_IMAGE }} \
            /bin/bash /workspace/build-linux-uboot.sh $(nproc) ${{ github.event.inputs.target || 'all' }}

      - name: Check compiled artifacts
        run: |
          echo "=== 编译产物 (${{ github.event.inputs.target || 'all' }}) ==="
          echo ""
          echo "--- Linux Kernel ---"
          ls -lh build/linux/zImage 2>/dev/null || echo "(none)"
          echo ""
          echo "--- Device Tree ---"
          ls build/linux/*.dtb 2>/dev/null | head -5 || echo "(none)"
          echo ""
          echo "--- App ---"
          ls -lh build/linux/bin/ 2>/dev/null || echo "(none)"
          ls -lh build/bin/NavigatorHMI_FW 2>/dev/null || echo "(none)"
          echo ""
          echo "--- U-Boot ---"
          ls -lh build/uboot/ 2>/dev/null || echo "(none)"
          echo ""
          echo "--- Rootfs ---"
          ls -lh build/rootfs/ 2>/dev/null || echo "(none)"
          if [ -f build/rootfs/rootfs.tar ]; then
            echo ""
            echo "--- Rootfs 中包含的应用 ---"
            tar tf build/rootfs/rootfs.tar | grep -E "NavigatorHMI_FW|usr/bin/" | head -10 || echo "(应用未打包进 rootfs)"
          fi

      - name: Upload Linux artifacts
        if: ${{ github.event.inputs.target == '' || github.event.inputs.target == 'all' || github.event.inputs.target == 'linux' || github.event.inputs.target == 'linux+app' }}
        uses: actions/upload-artifact@v4
        with:
          name: linux-${{ github.event.inputs.build_type || 'Debug' }}
          path: build/linux/

      - name: Upload U-Boot artifacts
        if: ${{ github.event.inputs.target == '' || github.event.inputs.target == 'all' || github.event.inputs.target == 'uboot' }}
        uses: actions/upload-artifact@v4
        with:
          name: uboot-${{ github.event.inputs.build_type || 'Debug' }}
          path: build/uboot/

      - name: Upload Qt artifacts
        if: ${{ github.event.inputs.target == 'qt' }}
        uses: actions/upload-artifact@v4
        with:
          name: qt5.12.9-arm
          path: build/qt5.12.9-arm/

      - name: Upload Rootfs artifacts
        if: ${{ github.event.inputs.target == '' || github.event.inputs.target == 'all' || github.event.inputs.target == 'rootfs' }}
        uses: actions/upload-artifact@v4
        with:
          name: rootfs-${{ github.event.inputs.build_type || 'Debug' }}
          path: build/rootfs/
